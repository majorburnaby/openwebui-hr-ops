<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Helpdesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --bg2:       #181c27;
      --bg3:       #1e2333;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.13);
      --text:      #e8eaf0;
      --muted:     #7a8099;
      --accent:    #4f7bff;
      --accent2:   #7c9eff;
      --accent-bg: rgba(79,123,255,0.12);
      --green:     #3ecf8e;
      --green-bg:  rgba(62,207,142,0.10);
      --user-bg:   #252b3d;
      --radius:    14px;
      --font:      'DM Sans', sans-serif;
      --mono:      'DM Mono', monospace;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 58px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 16px; height: 16px; }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--green-bg);
      border: 1px solid rgba(62,207,142,0.2);
      border-radius: 99px;
      padding: 4px 10px;
      font-size: 11.5px;
      color: var(--green);
      font-weight: 500;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn-new {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12.5px;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s;
    }

    .btn-new:hover { border-color: var(--accent); color: var(--accent2); background: var(--accent-bg); }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 0 8px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .chat-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Welcome screen ── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 48px 20px 32px;
      gap: 12px;
    }

    .welcome-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent) 0%, #7c4fff 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .welcome-icon svg { width: 28px; height: 28px; }

    #welcome h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    #welcome p {
      font-size: 14px;
      color: var(--muted);
      max-width: 400px;
      line-height: 1.6;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
      max-width: 540px;
    }

    .suggestion {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 7px 14px;
      font-size: 12.5px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font);
    }

    .suggestion:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: var(--accent-bg);
    }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 10px;
      padding: 4px 0;
      animation: fadeUp 0.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      margin-top: 2px;
    }

    .msg.user .avatar {
      background: var(--accent);
      color: #fff;
    }

    .msg.bot .avatar {
      background: linear-gradient(135deg, #4f7bff, #7c4fff);
      color: #fff;
    }

    .bubble {
      max-width: calc(100% - 46px);
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--text);
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--bg3);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    /* Markdown-like formatting inside bot bubbles */
    .bubble strong { color: #fff; font-weight: 600; }
    .bubble em { color: var(--accent2); font-style: normal; }

    .bubble p { margin: 0 0 8px; }
    .bubble p:last-child { margin-bottom: 0; }

    .bubble ul, .bubble ol {
      padding-left: 18px;
      margin: 6px 0 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .bubble li { color: var(--text); }

    .bubble h3 {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--accent2);
      margin: 10px 0 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .bubble h3:first-child { margin-top: 0; }

    .bubble code {
      font-family: var(--mono);
      font-size: 12.5px;
      background: rgba(79,123,255,0.15);
      color: var(--accent2);
      padding: 1px 5px;
      border-radius: 4px;
    }

    .bubble hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 10px 0;
    }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 6px 2px;
      align-items: center;
    }

    .typing-dots span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: dotBounce 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    /* Error bubble */
    .bubble.error {
      border-color: rgba(255,80,80,0.3);
      color: #ff8080;
    }

    /* ── Input area ── */
    #input-area {
      padding: 12px 20px 20px;
      background: var(--bg);
      flex-shrink: 0;
    }

    .input-wrap {
      max-width: 760px;
      margin: 0 auto;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 16px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.15s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,123,255,0.12);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      min-height: 22px;
      overflow-y: auto;
    }

    #user-input::placeholder { color: var(--muted); }

    #user-input::-webkit-scrollbar { width: 3px; }
    #user-input::-webkit-scrollbar-thumb { background: var(--border2); }

    #send-btn {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent2); transform: scale(1.05); }
    #send-btn:active:not(:disabled) { transform: scale(0.96); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 16px; height: 16px; }

    .input-footer {
      max-width: 760px;
      margin: 6px auto 0;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      opacity: 0.7;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 0 16px; }
      #input-area { padding: 10px 12px 16px; }
      .chat-inner { padding: 0 12px; }
      .status-pill { display: none; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-left">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    </div>
    <div>
      <div class="header-title">HR Helpdesk</div>
      <div class="header-subtitle">Powered by Dify AI</div>
    </div>
  </div>

  <div class="header-left" style="gap:10px">
    <div class="status-pill">
      <div class="status-dot"></div>
      Online
    </div>
    <button class="btn-new" onclick="newChat()" title="New conversation">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      New Chat
    </button>
  </div>
</header>

<!-- Chat messages -->
<div id="chat">
  <div class="chat-inner" id="chat-inner">

    <div id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
        </svg>
      </div>
      <h2>HR Helpdesk Assistant</h2>
      <p>Tanyakan apa saja tentang data karyawan, kontrak, turnover, dan informasi HR lainnya.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="ask(this.textContent)">Berapa total karyawan aktif?</button>
        <button class="suggestion" onclick="ask(this.textContent)">Siapa kontrak habis bulan ini?</button>
        <button class="suggestion" onclick="ask(this.textContent)">Outlet mana turnover tertinggi?</button>
        <button class="suggestion" onclick="ask(this.textContent)">Siapa masih probation?</button>
        <button class="suggestion" onclick="ask(this.textContent)">Siapa belum assign outlet?</button>
        <button class="suggestion" onclick="ask(this.textContent)">Ringkasan data karyawan</button>
      </div>
    </div>

  </div>
</div>

<!-- Input -->
<div id="input-area">
  <div class="input-wrap">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Tanyakan sesuatu tentang karyawan..."
      autocomplete="off"
      spellcheck="false"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Kirim">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="input-footer">Enter untuk kirim &nbsp;·&nbsp; Shift+Enter untuk baris baru</div>
</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  // API calls go through /api/chat (our Vercel serverless proxy)
  // to avoid exposing the Dify API key on the client side.
  const API_URL = '/api/chat';

  // ── State ─────────────────────────────────────────────────────────────────
  let conversationId = '';
  let isLoading = false;

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const chatInner  = document.getElementById('chat-inner');
  const chatEl     = document.getElementById('chat');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const welcomeEl  = document.getElementById('welcome');

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isLoading) sendMessage();
    }
  });

  // ── Suggestion click ──────────────────────────────────────────────────────
  function ask(text) {
    inputEl.value = text;
    inputEl.dispatchEvent(new Event('input'));
    sendMessage();
  }

  // ── New chat ──────────────────────────────────────────────────────────────
  function newChat() {
    conversationId = '';
    chatInner.innerHTML = '';
    chatInner.appendChild(welcomeEl);
    welcomeEl.style.display = 'flex';
    inputEl.value = '';
    inputEl.style.height = 'auto';
    setLoading(false);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setLoading(val) {
    isLoading = val;
    sendBtn.disabled = val;
  }

  function scrollToBottom() {
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function addMessage(role, content = '') {
    welcomeEl.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'KU' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (content) bubble.innerHTML = formatMarkdown(content);

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatInner.appendChild(msg);
    scrollToBottom();
    return bubble;
  }

  function addTyping() {
    welcomeEl.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'msg bot';
    msg.id = 'typing-msg';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatInner.appendChild(msg);
    scrollToBottom();
    return { msg, bubble };
  }

  function removeTyping() {
    const el = document.getElementById('typing-msg');
    if (el) el.remove();
  }

  // ── Basic markdown formatter ──────────────────────────────────────────────
  function formatMarkdown(text) {
    return text
      // Bold **text**
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      // Italic *text* (but skip **)
      .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
      // ### heading
      .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
      // Bullet lists
      .replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>')
      // Numbered lists
      .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>')
      // Wrap consecutive <li> items
      .replace(/(<li>.*<\/li>\n?)+/gs, m => `<ul>${m}</ul>`)
      // Inline code
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      // HR ---
      .replace(/^---+$/gm, '<hr>')
      // Double newline → paragraph
      .split(/\n\n+/)
      .map(block => {
        if (block.startsWith('<h3') || block.startsWith('<ul') || block.startsWith('<hr')) return block;
        return `<p>${block.replace(/\n/g, '<br>')}</p>`;
      })
      .join('');
  }

  // ── Send message ──────────────────────────────────────────────────────────
  async function sendMessage() {
    const query = inputEl.value.trim();
    if (!query || isLoading) return;

    // Reset input
    inputEl.value = '';
    inputEl.style.height = 'auto';
    setLoading(true);

    // Show user bubble
    addMessage('user', query);

    // Show typing indicator
    const { msg: typingMsg, bubble: typingBubble } = addTyping();

    let botBubble = null;
    let fullText  = '';

    try {
      const res = await fetch(API_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query,
          conversation_id: conversationId,
          user: 'hr-user-' + (localStorage.getItem('uid') || generateUID()),
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let   buffer  = '';

      // Replace typing indicator with real bot bubble on first token
      let started = false;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete last line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (!raw || raw === '[DONE]') continue;

          let evt;
          try { evt = JSON.parse(raw); } catch { continue; }

          // Store conversation_id from first event
          if (evt.conversation_id && !conversationId) {
            conversationId = evt.conversation_id;
          }

          // Accumulate answer text
          const chunk =
            evt.answer ??           // streaming message event
            evt.text  ??            // text_chunk event
            (evt.event === 'agent_message' ? evt.answer : null) ?? '';

          if (chunk) {
            if (!started) {
              removeTyping();
              botBubble = addMessage('bot');
              started = true;
            }
            fullText += chunk;
            botBubble.innerHTML = formatMarkdown(fullText) + '<span class="cursor">▌</span>';
            scrollToBottom();
          }
        }
      }

      // Clean up cursor
      if (botBubble) {
        botBubble.innerHTML = formatMarkdown(fullText);
      } else {
        // No tokens received — show empty fallback
        removeTyping();
        addMessage('bot', 'Maaf, tidak ada respons dari server. Silakan coba lagi.');
      }

    } catch (err) {
      removeTyping();
      const b = addMessage('bot');
      b.classList.add('error');
      b.innerHTML = `⚠️ ${err.message || 'Terjadi kesalahan. Silakan coba lagi.'}`;
    } finally {
      setLoading(false);
      scrollToBottom();
      inputEl.focus();
    }
  }

  // ── UID helper ────────────────────────────────────────────────────────────
  function generateUID() {
    const uid = Math.random().toString(36).slice(2, 10);
    localStorage.setItem('uid', uid);
    return uid;
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  generateUID();
  inputEl.focus();
</script>
</body>
</html>
